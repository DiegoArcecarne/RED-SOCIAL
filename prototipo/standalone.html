<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="color-scheme" content="dark" />
  <title>Prototipo (standalone) · App de planes</title>
  <meta name="description" content="Prototipo visual navegable de la app de planes (basado en PRODUCTO.md)." />
  <style>
/* =========================================================================
   Prototipo — App de planes. Modo oscuro tipo Instagram, minimalista.
   ========================================================================= */
:root{
  --bg:#000000;
  --surface:#0e0e10;
  --surface-2:#181819;
  --surface-3:#222225;
  --line:#262628;
  --ink:#f2f2f4;
  --ink-soft:#a6a6ad;
  --ink-dim:#6c6c73;
  --accent:#0a84ff;
  --green:#2bbb6e;
  --radius:14px;
  --maxw:430px;
  font-family:"Inter",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:#000;color:var(--ink);
  display:flex;justify-content:center;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
}

/* Marco tipo móvil */
.phone{
  position:relative;width:100%;max-width:var(--maxw);min-height:100vh;
  background:var(--bg);display:flex;flex-direction:column;overflow:hidden;
  border-left:1px solid var(--line);border-right:1px solid var(--line);
}
@media(min-width:480px){
  .phone{margin:24px 0;min-height:calc(100vh - 48px);border-radius:28px;border:1px solid var(--line)}
}

/* Iconos SVG monolínea */
.ico{display:inline-flex;width:1em;height:1em;line-height:0;vertical-align:-2px}
.ico svg{width:1em;height:1em;display:block;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.ico svg.fill{fill:currentColor;stroke:none}

/* Cabecera */
.appbar{
  position:sticky;top:0;z-index:20;background:rgba(0,0,0,.82);backdrop-filter:blur(14px);
  padding:16px 18px 0;border-bottom:1px solid var(--line);
}
.brand{display:flex;align-items:baseline;gap:10px;padding-bottom:14px}
.brand h1{font-size:20px;font-weight:700;letter-spacing:-.5px}
.brand .tag{font-size:11px;color:var(--ink-dim);letter-spacing:.3px}
.brand .spacer{flex:1}
.content-tabs{display:flex;gap:22px;overflow-x:auto;scrollbar-width:none}
.content-tabs::-webkit-scrollbar{display:none}
.content-tabs button{
  background:none;border:none;font-size:14px;font-weight:600;color:var(--ink-dim);
  padding:10px 0;white-space:nowrap;cursor:pointer;position:relative;font-family:inherit;
}
.content-tabs button.active{color:var(--ink)}
.content-tabs button.active::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--ink);border-radius:2px}

/* Zona scrollable */
.view{flex:1;overflow-y:auto;padding-bottom:84px}
.view.hidden{display:none}
#view-feed{padding:0}

/* Filtros */
.filters{display:flex;flex-direction:column;gap:10px;padding:14px 14px 12px}
.chips{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{
  flex:none;border:1px solid var(--line);background:var(--surface);border-radius:999px;
  padding:7px 14px;font-size:13px;font-weight:600;color:var(--ink-soft);cursor:pointer;font-family:inherit;transition:.15s;
}
.chip.active{background:var(--ink);color:#000;border-color:var(--ink)}
.seg-row{display:flex;gap:8px}
.seg{display:flex;background:var(--surface-2);border-radius:11px;padding:3px;gap:2px;flex:1}
.seg button{
  flex:1;border:none;background:none;padding:8px 4px;border-radius:8px;font-size:12.5px;font-weight:600;
  color:var(--ink-soft);cursor:pointer;font-family:inherit;transition:.15s;
}
.seg button.active{background:var(--surface-3);color:var(--ink)}

/* ===================== GRID tipo Instagram ===================== */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px}
.cell{
  position:relative;aspect-ratio:1/1;border:none;cursor:pointer;overflow:hidden;
  display:flex;flex-direction:column;justify-content:flex-end;padding:0;color:#fff;text-align:left;
  font-family:inherit;
}
.cell-scrim{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.78) 4%,rgba(0,0,0,.12) 46%,rgba(0,0,0,.18) 100%)}
.cell-top{position:absolute;top:7px;left:7px;right:7px;display:flex;align-items:center;justify-content:space-between;z-index:2}
.cell-price{font-size:11px;font-weight:700;background:rgba(0,0,0,.55);backdrop-filter:blur(3px);padding:3px 7px;border-radius:7px;color:#fff}
.cell-price.free{background:rgba(43,187,110,.92)}
.cell-ic{font-size:13px;opacity:.92;display:inline-flex;background:rgba(0,0,0,.5);padding:3px;border-radius:6px}
.cell-like{font-size:11px;font-weight:700;background:rgba(0,0,0,.5);padding:3px 7px;border-radius:7px;display:inline-flex;align-items:center;gap:4px}
.cell-info{position:relative;z-index:2;padding:9px 9px 10px}
.cell-title{display:block;font-size:12.5px;font-weight:700;line-height:1.22;letter-spacing:-.2px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cell-meta{display:flex;align-items:center;gap:4px;margin-top:4px;font-size:10.5px;color:rgba(255,255,255,.72);font-weight:500}
.cell-meta .ico{font-size:11px}

.vividas-head{font-size:12px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.6px;padding:14px 14px 10px}

/* Placeholder de pestañas */
.empty-tab{text-align:center;color:var(--ink-soft);padding:70px 30px}
.empty-tab .empty-ic{font-size:34px;color:var(--ink-dim);display:inline-flex;margin-bottom:14px}
.empty-tab h3{color:var(--ink);font-size:17px;margin-bottom:8px;font-weight:700}
.empty-tab p{font-size:13.5px;line-height:1.55}

/* ===================== MAPA ===================== */
#view-mapa{padding:0}
.map-wrap{position:relative}
.map{
  position:relative;height:60vh;min-height:360px;overflow:hidden;
  background:
    repeating-linear-gradient(0deg,#0b0b0d 0 39px,#101013 39px 40px),
    repeating-linear-gradient(90deg,#0b0b0d 0 39px,#101013 39px 40px),
    #0b0b0d;
}
.map::before{content:"";position:absolute;inset:0;background:linear-gradient(115deg,transparent 45%,rgba(10,132,255,.10) 45% 51%,transparent 51%)}
.map::after{content:"";position:absolute;width:150px;height:120px;right:7%;bottom:9%;background:rgba(43,187,110,.10);border-radius:42% 50% 46% 54%}
.map-hint{
  position:absolute;top:12px;left:12px;right:12px;z-index:4;
  background:rgba(20,20,22,.9);backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:11px;
  padding:9px 12px;font-size:12.5px;color:var(--ink-soft);display:flex;align-items:center;gap:7px;
}
.pin{position:absolute;transform:translate(-50%,-100%);cursor:pointer;z-index:3;display:flex;flex-direction:column;align-items:center;background:none;border:none}
.pin-dot{
  width:34px;height:34px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:16px;
  background:var(--surface-3);border:1.5px solid rgba(255,255,255,.25);box-shadow:0 4px 12px rgba(0,0,0,.5);
}
.pin.public .pin-dot{background:var(--accent);border-color:rgba(255,255,255,.4)}
.pin.business .pin-dot{background:var(--green);border-color:rgba(255,255,255,.4)}
.pin.secret .pin-dot{background:#2a2a2e;border-color:rgba(255,255,255,.3)}
.pin.selected .pin-dot{outline:3px solid rgba(255,255,255,.25);transform:scale(1.06)}
.pin-cap{margin-top:5px;font-size:10.5px;font-weight:600;background:rgba(20,20,22,.92);color:var(--ink);padding:2px 7px;border-radius:7px;white-space:nowrap;border:1px solid var(--line)}
.map-legend{position:absolute;bottom:12px;left:12px;z-index:4;display:flex;flex-direction:column;gap:5px}
.map-legend .lg{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:600;color:var(--ink);background:rgba(20,20,22,.9);padding:4px 9px;border-radius:8px;border:1px solid var(--line)}
.lgd{width:10px;height:10px;border-radius:50%}
.lgd.business{background:var(--green)}.lgd.public{background:var(--accent)}.lgd.secret{background:#3a3a3e}

.map-sheet{padding:16px 16px 0}
.map-sheet h3{font-size:16px;margin-bottom:4px;display:flex;align-items:center;gap:7px;font-weight:700}
.map-sheet .sub{font-size:12.5px;color:var(--ink-soft);margin-bottom:14px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.vchk{color:var(--accent);display:inline-flex;font-size:14px}
.mini-plan{
  display:flex;gap:12px;align-items:center;background:var(--surface);border:1px solid var(--line);border-radius:13px;
  padding:9px;margin-bottom:9px;cursor:pointer;width:100%;text-align:left;font-family:inherit;color:var(--ink);
}
.mini-thumb{width:46px;height:46px;border-radius:10px;flex:none}
.mini-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
.mini-t{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-m{font-size:12px;color:var(--ink-soft)}
.mini-price{font-size:13px;font-weight:800;color:var(--green)}
.mini-price.paid{color:var(--ink)}

/* ===================== DETALLE ===================== */
#view-detail{padding-bottom:0}
.detail-hero{height:240px;position:relative;display:flex;align-items:flex-end;padding:18px}
.hero-scrim{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.85),rgba(0,0,0,.15) 60%,rgba(0,0,0,.35))}
.hero-content{position:relative;z-index:2}
.back-btn{position:absolute;top:14px;left:14px;z-index:3;width:38px;height:38px;border-radius:50%;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.15);color:#fff;font-size:17px;cursor:pointer;display:grid;place-items:center}
.detail-hero h2{font-size:24px;font-weight:700;letter-spacing:-.6px;line-height:1.18;color:#fff;margin-top:8px}
.hero-loc{display:flex;align-items:center;gap:6px;margin-top:8px;font-size:13px;color:rgba(255,255,255,.82)}
.tags-row{display:flex;gap:6px;flex-wrap:wrap}
.tag{font-size:11px;font-weight:700;padding:4px 9px;border-radius:999px;background:rgba(255,255,255,.16);backdrop-filter:blur(4px);color:#fff;display:inline-flex;align-items:center;gap:4px}
.tag-free{background:rgba(43,187,110,.92)}
.tag-line{background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.25)}
.detail-body{padding:18px 16px 0}
.kpis{display:flex;gap:9px;margin-bottom:16px}
.kpi{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:13px 8px;text-align:center}
.kpi .v{font-size:16px;font-weight:800;letter-spacing:-.3px}
.kpi .k{font-size:11px;color:var(--ink-soft);margin-top:4px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:4px}
.block{background:var(--surface);border:1px solid var(--line);border-radius:15px;padding:15px;margin-bottom:12px}
.block h4{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-dim);margin-bottom:11px;font-weight:700}
.block p{font-size:14.5px;line-height:1.55;color:var(--ink)}
.host-card{display:flex;align-items:center;gap:12px}
.avatar{width:46px;height:46px;border-radius:50%;flex:none;display:grid;place-items:center;font-size:16px;font-weight:700;color:var(--ink);background:var(--surface-3);border:1px solid var(--line)}
.avatar.sm{width:34px;height:34px;font-size:12px;border:2px solid var(--bg);margin-left:-10px}
.avatar.sm:first-child{margin-left:0}
.host-card .meta{flex:1}
.host-card .meta .n{font-size:15px;font-weight:700;display:flex;align-items:center;gap:7px}
.host-card .meta .s{font-size:12.5px;color:var(--ink-soft);margin-top:3px;display:flex;align-items:center;gap:6px}
.biz{font-size:11px;font-weight:700;background:rgba(43,187,110,.16);color:var(--green);padding:3px 8px;border-radius:999px}
.trust-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.trust{font-size:12px;font-weight:600;background:var(--surface-2);color:var(--ink-soft);padding:7px 11px;border-radius:999px;display:inline-flex;gap:6px;align-items:center}
.trust .ico{color:var(--ink)}
.attendees{display:flex;align-items:center}
.attendees .more{font-size:13px;color:var(--ink-soft);margin-left:12px;font-weight:600}
.rate{display:inline-flex;align-items:center;gap:4px;font-weight:700}
.rate .ico{color:#e6b450}
.review{padding:11px 0;border-bottom:1px solid var(--line)}
.review:last-child{border-bottom:none}
.review .top{display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-bottom:4px}
.review .top .st{color:#e6b450;display:inline-flex;gap:1px;font-size:12px}
.review p{font-size:13.5px;color:var(--ink-soft);line-height:1.45}
.secret-note{display:flex;gap:11px;align-items:flex-start;background:var(--surface-2);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}
.secret-note .sn-ic{font-size:18px;color:var(--ink);margin-top:1px}
.secret-note p{font-size:13px;line-height:1.5;color:var(--ink-soft)}
.place-link{display:flex;align-items:center;gap:12px;cursor:pointer;width:100%;background:none;border:none;font-family:inherit;color:var(--ink);text-align:left;padding:0}
.place-link .pl-info{flex:1;min-width:0}
.pl-n{display:block;font-weight:700;font-size:14.5px}
.pl-s{display:block;font-size:12.5px;color:var(--ink-soft);margin-top:2px}
.pl-arrow{color:var(--ink-dim);font-size:18px;display:inline-flex}
.action-bar{position:sticky;bottom:0;background:rgba(0,0,0,.9);backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:13px 16px;display:flex;align-items:center;gap:14px;margin:14px -16px 0}
.action-bar .pr .v{font-size:19px;font-weight:800}
.action-bar .pr .k{font-size:11px;color:var(--ink-soft);margin-top:1px}
.btn-join{flex:1;border:none;border-radius:13px;padding:15px;font-size:15px;font-weight:800;color:#fff;cursor:pointer;font-family:inherit;background:var(--accent)}
.btn-join.joined{background:var(--surface-3);color:var(--ink)}

/* Navegación inferior */
.tabbar{
  position:absolute;left:0;right:0;bottom:0;height:62px;z-index:30;
  background:rgba(0,0,0,.92);backdrop-filter:blur(14px);border-top:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-around;
}
.tabbar button{
  background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:4px;
  color:var(--ink-dim);font-size:11px;font-weight:600;cursor:pointer;flex:1;font-family:inherit;
}
.tabbar button .ico{font-size:23px}
.tabbar button.active{color:var(--ink)}

/* Portadas (oscuras, sobrias, duotono) */
.g-wine{background:linear-gradient(150deg,#3a2230,#160f14)}
.g-sunset{background:linear-gradient(150deg,#392c20,#17110d)}
.g-grape{background:linear-gradient(150deg,#2b2340,#14111e)}
.g-dark{background:linear-gradient(150deg,#27272c,#0e0e10)}
.g-forest{background:linear-gradient(150deg,#1e332f,#0e1a17)}

/* Toast */
.toast{
  position:absolute;left:50%;bottom:78px;transform:translateX(-50%) translateY(16px);
  background:var(--surface-3);border:1px solid var(--line);color:var(--ink);padding:11px 18px;border-radius:999px;
  font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:.25s;z-index:50;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  </style>
</head>
<body>
  <div class="phone">
    <!-- Cabecera -->
    <header class="appbar">
      <div class="brand">
        <h1>planes</h1>
        <span class="spacer"></span>
        <span class="tag">prototipo</span>
      </div>
      <div id="appbar-tabs">
        <nav class="content-tabs">
          <button data-tab="vividas">Vividas</button>
          <button data-tab="disponibles" class="active">Disponibles</button>
          <button data-tab="stories">Stories</button>
          <button data-tab="menciones">Menciones</button>
        </nav>
      </div>
    </header>

    <!-- Vista: Feed / Descubrir -->
    <main id="view-feed" class="view">
      <div id="feed-filters" class="filters"></div>
      <div id="feed-list"></div>
    </main>

    <!-- Vista: Mapa -->
    <main id="view-mapa" class="view hidden">
      <div class="map-wrap"><div id="map" class="map"></div></div>
      <div id="map-sheet" class="map-sheet"></div>
    </main>

    <!-- Vista: Detalle de plan -->
    <main id="view-detail" class="view hidden"></main>

    <!-- Navegación inferior -->
    <nav class="tabbar">
      <button data-nav="feed" class="active">
        <i class="ico"><svg viewBox="0 0 24 24"><rect x="3.5" y="3.5" width="7" height="7" rx="1.4"/><rect x="13.5" y="3.5" width="7" height="7" rx="1.4"/><rect x="3.5" y="13.5" width="7" height="7" rx="1.4"/><rect x="13.5" y="13.5" width="7" height="7" rx="1.4"/></svg></i>
        Descubrir
      </button>
      <button data-nav="mapa">
        <i class="ico"><svg viewBox="0 0 24 24"><path d="M9 4 3.5 6.2v13.6L9 17.6l6 2.2 5.5-2.2V3.9L15 6.1z"/><path d="M9 4v13.6M15 6.1v13.7"/></svg></i>
        Mapa
      </button>
    </nav>

    <div id="toast" class="toast"></div>
  </div>

  <script>
/* =========================================================================
   Datos de ejemplo (mock) del prototipo — coherentes con PRODUCTO.md
   ========================================================================= */

// Categorías de la taxonomía de arranque
const CATEGORIES = [
  { id: 'outdoor',   label: 'Outdoor',     emoji: '🏔️' },
  { id: 'fiesta',    label: 'Fiesta',      emoji: '🎉' },
  { id: 'gastro',    label: 'Gastronomía', emoji: '🍷' },
  { id: 'cultura',   label: 'Cultura',     emoji: '🎭' },
  { id: 'deporte',   label: 'Deporte',     emoji: '🏃' },
  { id: 'bienestar', label: 'Bienestar',   emoji: '🧘' },
  { id: 'social',    label: 'Social',      emoji: '🥂' },
  { id: 'viajeros',  label: 'Viajeros',    emoji: '🎒' },
];

// Lugares (entidad persistente). x/y = posición % sobre el mapa estilizado.
const PLACES = [
  { id: 'victoria',  name: 'Vermutería Victoria', kind: 'negocio', verified: true,  city: 'Burgos', category: 'gastro',  hashtag: '#himnovictoria',     x: 22, y: 30, rating: 4.8 },
  { id: 'azotea',    name: 'Azotea Círculo',      kind: 'negocio', verified: true,  city: 'Madrid', category: 'fiesta',  hashtag: '#rooftopmadrid',     x: 54, y: 44, rating: 4.6 },
  { id: 'debod',     name: 'Templo de Debod',     kind: 'publico', verified: false, city: 'Madrid', category: 'outdoor', hashtag: '#atardecerdebod',    x: 40, y: 52, rating: 4.9 },
  { id: 'retiro',    name: 'Parque del Retiro',   kind: 'publico', verified: false, city: 'Madrid', category: 'outdoor', hashtag: '#retiromorning',     x: 66, y: 60, rating: 4.7 },
  { id: 'clamores',  name: 'Sala Clamores',       kind: 'negocio', verified: true,  city: 'Madrid', category: 'cultura', hashtag: '#clamoresjazz',      x: 60, y: 30, rating: 4.5 },
  { id: 'sierra',    name: 'Mirador de la Sierra', kind: 'publico', verified: false, city: 'Madrid', category: 'deporte', hashtag: '#trailamanecer',     x: 30, y: 68, rating: 4.8 },
  { id: 'secreto',   name: 'Lugar por desvelar',  kind: 'publico', verified: false, city: 'Madrid', category: 'gastro',  hashtag: '#cenasecretamadrid', x: 48, y: 22, rating: 4.9, secret: true },
  { id: 'lavapies',  name: 'Plaza de Lavapiés',   kind: 'publico', verified: false, city: 'Madrid', category: 'viajeros', hashtag: '#tapasviajeros',    x: 72, y: 46, rating: 4.6 },
];

// Helper: fecha futura a partir de ahora
const hoursFromNow = (h) => new Date(Date.now() + h * 3600 * 1000);

// Planes (unidad atómica). level: 1 ancla recurrente, 2 usuario gratuito, 3 pago curado.
const PLANS = [
  {
    id: 'p1', title: 'El himno de la Victoria', placeId: 'victoria', category: 'gastro',
    level: 1, paid: false, price: 0, recurring: true,
    host: { name: 'Vermutería Victoria', business: true, verified: true, rating: 4.8, reliability: 99 },
    when: hoursFromNow(5), groupMin: 10, groupMax: 60, joined: 41,
    gradient: 'g-wine', emoji: '🍷',
    summary: 'Cada noche a las 22:00, todo el bar canta. El ritual de Burgos que ya tiene gente: solo súmate.',
    secret: false,
  },
  {
    id: 'p2', title: 'Atardecer en el Templo de Debod', placeId: 'debod', category: 'outdoor',
    level: 2, paid: false, price: 0, recurring: false,
    host: { name: 'Lucía R.', business: false, verified: true, rating: 4.9, reliability: 96 },
    when: hoursFromNow(28), groupMin: 4, groupMax: 15, joined: 9,
    gradient: 'g-sunset', emoji: '🌅',
    summary: 'Quedada para ver el mejor atardecer de Madrid. Traed manta y algo para picar.',
    secret: false,

function ico(name){ return `<i class="ico">${SVG[name]||''}</i>`; }

/* ---------- utilidades ---------- */
function fmtCountdown(date){
  const diff = date - Date.now();
  if (diff <= 0) return 'En marcha';
  const h = Math.floor(diff/3600000);
  const d = Math.floor(h/24);
  if (d >= 1) return `${d} d ${h%24} h`;
  const m = Math.floor((diff%3600000)/60000);
  return `${h} h ${m} min`;
}
function fmtWhen(date){
  const dias=['dom','lun','mar','mié','jue','vie','sáb'];
  const h = date.getHours().toString().padStart(2,'0');
  const min = date.getMinutes().toString().padStart(2,'0');
  return `${dias[date.getDay()]} · ${h}:${min}`;
}
function sizeBucket(p){
  if (p.groupMax <= 8) return 'intimo';
  if (p.groupMax <= 20) return 'mediano';
  return 'grande';
}
function sizeLabel(p){ return {intimo:'Íntimo',mediano:'Mediano',grande:'Grande'}[sizeBucket(p)]; }
function initials(name){ return name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase(); }
function levelTag(p){
  if (p.level===1) return `<span class="tag tag-line">${ico('repeat')} Recurrente</span>`;
  if (p.paid)      return `<span class="tag">Experiencia</span>`;
  return `<span class="tag tag-free">Gratis</span>`;
}
function priceTag(p){ return p.paid ? `<span class="cell-price">${p.price} €</span>` : `<span class="cell-price free">Gratis</span>`; }
function rating(n){ return `<span class="rate">${ico('star')} ${n}</span>`; }
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._tmo);t._tmo=setTimeout(()=>t.classList.remove('show'),1900);
}

/* ---------- filtrado ---------- */
function filteredPlans(){
  return PLANS.filter(p=>{
    if (state.size!=='todos' && sizeBucket(p)!==state.size) return false;
    if (state.category!=='todas' && p.category!==state.category) return false;
    if (state.price==='gratis' && p.paid) return false;
    if (state.price==='pago' && !p.paid) return false;
    return true;
  });
}

/* ---------- GRID tipo Instagram (Disponibles) ---------- */
function gridCell(p){
  const place = getPlace(p.placeId);
  const loc = p.secret ? 'Zona aprox.' : place.name;
  return `
  <button class="cell ${p.gradient}" onclick="go('plan/${p.id}')" aria-label="${p.title}">
    <span class="cell-scrim"></span>
    <span class="cell-top">${priceTag(p)}${p.secret?`<span class="cell-ic">${ico('lock')}</span>`:(p.level===1?`<span class="cell-ic">${ico('repeat')}</span>`:'')}</span>
    <span class="cell-info">
      <span class="cell-title">${p.title}</span>
      <span class="cell-meta">${loc} · ${ico('users')} ${p.joined}/${p.groupMax}</span>
    </span>
  </button>`;
}
function renderFeed(){
  const plans = filteredPlans();
  const cont = document.getElementById('feed-list');
  if (!plans.length){ cont.innerHTML = emptyTab('grid','Sin planes con esos filtros','Prueba a ampliar el tamaño de grupo o el tema.'); return; }
  cont.innerHTML = `<div class="grid">${plans.map(gridCell).join('')}</div>`;
}

function emptyTab(icon,title,text){
  return `<div class="empty-tab"><span class="empty-ic">${ico(icon)}</span><h3>${title}</h3><p>${text}</p></div>`;
}

function renderContent(){
  const filters = document.getElementById('feed-filters');
  const list = document.getElementById('feed-list');
  document.querySelectorAll('.content-tabs button').forEach(b=>{
    b.classList.toggle('active', b.dataset.tab===state.contentTab);
  });
  if (state.contentTab==='disponibles'){
    filters.style.display='flex';
    renderFeed();
  } else {
    filters.style.display='none';
    if (state.contentTab==='vividas') list.innerHTML = renderVividas();
    else if (state.contentTab==='stories') list.innerHTML = emptyTab('clock','Stories · el “ahora mismo”','Contenido efímero de planes en marcha. El prototipo se centra en Descubrir, Mapa y la ficha de plan.');

/* ---------- mapa ---------- */
function placeKindClass(pl){ return pl.secret ? 'secret' : (pl.kind==='negocio' ? 'business' : 'public'); }
function renderMap(){
  const map = document.getElementById('map');
  const pins = PLACES.map(pl=>{
    const sel = state.selectedPlace===pl.id ? 'selected' : '';
    const inner = pl.secret ? ico('lock') : (pl.kind==='negocio' ? ico('shield') : ico('pin'));
    return `<button class="pin ${placeKindClass(pl)} ${sel}" style="left:${pl.x}%;top:${pl.y}%" onclick="selectPlace('${pl.id}')" aria-label="${pl.name}">
      <span class="pin-dot">${inner}</span><span class="pin-cap">${pl.secret?'·····':pl.name}</span>
    </button>`;
  }).join('');
  map.innerHTML = `
    <div class="map-hint">${ico('pin')} Madrid · ${PLACES.length} lugares cerca · toca un pin</div>
    ${pins}
    <div class="map-legend">
      <span class="lg"><i class="lgd business"></i>Negocio verificado</span>
      <span class="lg"><i class="lgd public"></i>Lugar público</span>
      <span class="lg"><i class="lgd secret"></i>Secreto</span>
    </div>`;
  renderMapSheet();
}
function renderMapSheet(){
  const sheet = document.getElementById('map-sheet');
  if (!state.selectedPlace){
    sheet.innerHTML = `<h3>Planes cerca de ti</h3><div class="sub">Toca un lugar en el mapa para ver sus planes y su histórico.</div>` +
      PLANS.slice(0,4).map(miniPlan).join('');
    return;
  }
  const pl = getPlace(state.selectedPlace);
  const plans = PLANS.filter(p=>p.placeId===pl.id);
  sheet.innerHTML = `
    <h3>${pl.secret?'Lugar por desvelar':pl.name} ${pl.verified?`<span class="vchk">${ico('check')}</span>`:''}</h3>
    <div class="sub">${pl.kind==='negocio'?'Negocio verificado':'Lugar público'} · ${pl.city} · ${rating(pl.rating)} · ${pl.hashtag}</div>
    ${plans.length?plans.map(miniPlan).join(''):'<div class="sub">Sin planes próximos en este lugar.</div>'}`;
}
function miniPlan(p){
  return `<button class="mini-plan" onclick="go('plan/${p.id}')">
    <span class="mini-thumb ${p.gradient}"></span>
    <span class="mini-info">
      <span class="mini-t">${p.title}</span>
      <span class="mini-m">${fmtWhen(p.when)} · ${sizeLabel(p)} · ${p.joined}/${p.groupMax}</span>
    </span>
    <span class="mini-price ${p.paid?'paid':''}">${p.paid?p.price+' €':'Gratis'}</span>
  </button>`;
}
function selectPlace(id){
  state.selectedPlace = state.selectedPlace===id ? null : id;
  renderMap();
}

function go(path){ location.hash = '#/'+path; }
function showView(name){
  ['feed','mapa','detail'].forEach(v=>{
    document.getElementById('view-'+v).classList.toggle('hidden', v!==name);
  });
  document.getElementById('appbar-tabs').style.display = (name==='feed')?'block':'none';
  document.querySelectorAll('.tabbar button').forEach(b=>{
    b.classList.toggle('active', b.dataset.nav===(name==='detail'?state.navTab:name));

}
function router(){
  const hash = location.hash.replace(/^#\//,'') || 'feed';
  const [route,arg] = hash.split('/');
  if (route==='plan' && arg){ renderDetail(arg); showView('detail'); document.getElementById('view-detail').scrollTop=0; }
  else if (route==='mapa'){ state.navTab='mapa'; renderMap(); showView('mapa'); }
  else { state.navTab='feed'; renderContent(); showView('feed'); }
}

/* ---------- filtros ---------- */
function buildFilters(){
  const cont = document.getElementById('feed-filters');
  const sizes=[['todos','Todos'],['intimo','Íntimo'],['mediano','Mediano'],['grande','Grande']];
  const prices=[['todos','Todo'],['gratis','Gratis'],['pago','Pago']];
  cont.innerHTML = `
    <div class="chips" id="chips-cat">
      <button class="chip active" data-v="todas">Todos</button>
      ${CATEGORIES.map(c=>`<button class="chip" data-v="${c.id}">${c.label}</button>`).join('')}
    </div>
    <div class="seg-row">
      <div class="seg" id="seg-size">${sizes.map(([v,l])=>`<button data-v="${v}" class="${v==='todos'?'active':''}">${l}</button>`).join('')}</div>
      <div class="seg" id="seg-price">${prices.map(([v,l])=>`<button data-v="${v}" class="${v==='todos'?'active':''}">${l}</button>`).join('')}</div>
    </div>`;
  cont.querySelector('#seg-size').onclick = e=>{ const b=e.target.closest('button'); if(!b)return; state.size=b.dataset.v; setActive('#seg-size button',b); renderFeed(); };
  cont.querySelector('#seg-price').onclick = e=>{ const b=e.target.closest('button'); if(!b)return; state.price=b.dataset.v; setActive('#seg-price button',b); renderFeed(); };
  cont.querySelector('#chips-cat').onclick = e=>{ const b=e.target.closest('button'); if(!b)return; state.category=b.dataset.v; setActive('#chips-cat button',b); renderFeed(); };
}
function setActive(sel,el){ document.querySelectorAll(sel).forEach(x=>x.classList.remove('active')); el.classList.add('active'); }

/* ---------- init ---------- */
function init(){
  buildFilters();
  document.querySelectorAll('.content-tabs button').forEach(b=>{ b.onclick=()=>{ state.contentTab=b.dataset.tab; renderContent(); }; });
  document.querySelectorAll('.tabbar button').forEach(b=>{ b.onclick=()=>go(b.dataset.nav); });
  window.addEventListener('hashchange', router);
  router();
}
if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
else init();

  </script>
</body>
</html>
