<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="color-scheme" content="dark" />
  <title>Prototipo (standalone) · App de planes</title>
  <meta name="description" content="Prototipo visual navegable de la app de planes (basado en PRODUCTO.md)." />
  <style>
/* =========================================================================
   Prototipo — App de planes. Modo oscuro tipo Instagram, minimalista.
   ========================================================================= */
:root{
  --bg:#000000;
  --surface:#0e0e10;
  --surface-2:#161618;
  --surface-3:#212124;
  --line:#262628;
  --ink:#f2f2f4;
  --ink-soft:#a6a6ad;
  --ink-dim:#6c6c73;
  --accent:#3d6fb3;        /* azul sobrio, único acento */
  --radius:14px;
  --maxw:430px;
  font-family:"Inter",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:#000;color:var(--ink);display:flex;justify-content:center;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}

.phone{
  position:relative;width:100%;max-width:var(--maxw);min-height:100vh;background:var(--bg);
  display:flex;flex-direction:column;overflow:hidden;border-left:1px solid var(--line);border-right:1px solid var(--line);
}
@media(min-width:480px){ .phone{margin:24px 0;min-height:calc(100vh - 48px);border-radius:28px;border:1px solid var(--line)} }

/* Iconos */
.ico{display:inline-flex;width:1em;height:1em;line-height:0;vertical-align:-2px}
.ico svg{width:1em;height:1em;display:block;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.ico svg.fill,.ico svg .fill{fill:currentColor;stroke:none}

/* Cabecera */
.appbar{position:sticky;top:0;z-index:20;background:rgba(0,0,0,.82);backdrop-filter:blur(14px);padding:16px 18px 0;border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:baseline;gap:10px;padding-bottom:12px}
.brand h1{font-size:20px;font-weight:700;letter-spacing:-.5px}
.brand .tag{font-size:11px;color:var(--ink-dim);letter-spacing:.3px}
.brand .spacer{flex:1}

/* Pestañas de contenido por iconos */
.content-tabs{display:flex;justify-content:space-around;gap:6px}
.content-tabs button{
  background:none;border:none;cursor:pointer;font-family:inherit;color:var(--ink-dim);
  display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px 10px;flex:1;position:relative;
}
.content-tabs button .ico{font-size:21px}
.content-tabs button span{font-size:10px;font-weight:600}
.content-tabs button.active{color:var(--ink)}
.content-tabs button.active::after{content:"";position:absolute;left:18%;right:18%;bottom:-1px;height:2px;background:var(--ink);border-radius:2px}

/* Scroll */
.view{flex:1;overflow-y:auto;padding-bottom:84px}
.view.hidden{display:none}
#view-feed,#view-mapa,#view-perfil{padding-left:0;padding-right:0}

/* Filtros por iconos */
.filters{display:flex;flex-direction:column;gap:12px;padding:14px 12px 12px}
.chips{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chips button,.iseg button{
  flex:none;border:1px solid var(--line);background:var(--surface);border-radius:12px;cursor:pointer;font-family:inherit;
  color:var(--ink-soft);display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 11px;transition:.15s;min-width:58px;
}
.chips button .ico,.iseg button .ico{font-size:18px}
.chips button span,.iseg button span{font-size:10px;font-weight:600;white-space:nowrap}
.chips button.active,.iseg button.active{background:var(--ink);color:#000;border-color:var(--ink)}
.seg-row{display:flex;gap:8px}
.iseg{display:flex;gap:5px;flex:1;background:var(--surface-2);border:1px solid var(--line);border-radius:13px;padding:4px}
.iseg button{flex:1;border:none;background:none;min-width:0;border-radius:9px;padding:7px 4px}
.iseg button.active{background:var(--surface-3);color:var(--ink);border:none}

/* ===================== GRID tipo Instagram ===================== */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px}
.cell{position:relative;aspect-ratio:1/1;border:none;cursor:pointer;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;padding:0;color:#fff;text-align:left;font-family:inherit}
.cell-scrim{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.78) 4%,rgba(0,0,0,.1) 46%,rgba(0,0,0,.16) 100%)}
.cell-corner{position:absolute;top:7px;right:7px;z-index:2;font-size:13px;color:rgba(255,255,255,.82);background:rgba(0,0,0,.42);backdrop-filter:blur(3px);width:24px;height:24px;border-radius:7px;display:grid;place-items:center}
.cell-info{position:relative;z-index:2;padding:9px 9px 10px}
.cell-title{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;font-size:12.5px;font-weight:700;line-height:1.22;letter-spacing:-.2px}
.cell-meta{display:flex;align-items:center;gap:4px;margin-top:4px;font-size:10.5px;color:rgba(255,255,255,.72);font-weight:500}
.cell-meta .ico{font-size:12px}

/* Placeholder de pestañas */
.empty-tab{text-align:center;color:var(--ink-soft);padding:70px 30px}
.empty-tab .empty-ic{font-size:34px;color:var(--ink-dim);display:inline-flex;margin-bottom:14px}
.empty-tab h3{color:var(--ink);font-size:17px;margin-bottom:8px;font-weight:700}
.empty-tab p{font-size:13.5px;line-height:1.55}

/* ===================== MAPA ===================== */
.map-wrap{position:relative}
.map{position:relative;height:60vh;min-height:360px;overflow:hidden;
  background:repeating-linear-gradient(0deg,#0b0b0d 0 39px,#101013 39px 40px),repeating-linear-gradient(90deg,#0b0b0d 0 39px,#101013 39px 40px),#0b0b0d}
.map::before{content:"";position:absolute;inset:0;background:linear-gradient(115deg,transparent 45%,rgba(120,130,150,.10) 45% 51%,transparent 51%)}
.map::after{content:"";position:absolute;width:150px;height:120px;right:7%;bottom:9%;background:rgba(120,150,130,.10);border-radius:42% 50% 46% 54%}
.map-hint{position:absolute;top:12px;left:12px;right:12px;z-index:4;background:rgba(20,20,22,.9);backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:11px;padding:9px 12px;font-size:12.5px;color:var(--ink-soft);display:flex;align-items:center;gap:7px}
.pin{position:absolute;transform:translate(-50%,-100%);cursor:pointer;z-index:3;display:flex;flex-direction:column;align-items:center;background:none;border:none}
.pin-dot{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:16px;background:var(--surface-3);border:1.5px solid rgba(255,255,255,.22);box-shadow:0 4px 12px rgba(0,0,0,.5)}
.pin.public .pin-dot{background:#37526e;border-color:rgba(255,255,255,.32)}
.pin.business .pin-dot{background:#3a5f55;border-color:rgba(255,255,255,.32)}
.pin.secret .pin-dot{background:#2a2a2e;border-color:rgba(255,255,255,.28)}
.pin.selected .pin-dot{outline:3px solid rgba(255,255,255,.22);transform:scale(1.06)}
.pin-cap{margin-top:5px;font-size:10.5px;font-weight:600;background:rgba(20,20,22,.92);color:var(--ink);padding:2px 7px;border-radius:7px;white-space:nowrap;border:1px solid var(--line)}
.map-legend{position:absolute;bottom:12px;left:12px;z-index:4;display:flex;flex-direction:column;gap:5px}
.map-legend .lg{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:600;color:var(--ink);background:rgba(20,20,22,.9);padding:4px 9px;border-radius:8px;border:1px solid var(--line)}
.lgd{width:10px;height:10px;border-radius:50%}
.lgd.business{background:#3a5f55}.lgd.public{background:#37526e}.lgd.secret{background:#3a3a3e}
.map-sheet{padding:16px 16px 0}
.map-sheet h3{font-size:16px;margin-bottom:4px;display:flex;align-items:center;gap:7px;font-weight:700}
.map-sheet .sub{font-size:12.5px;color:var(--ink-soft);margin-bottom:14px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.vchk{color:var(--ink);display:inline-flex;font-size:14px}
.mini-plan{display:flex;gap:12px;align-items:center;background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:9px;margin-bottom:9px;cursor:pointer;width:100%;text-align:left;font-family:inherit;color:var(--ink)}
.mini-thumb{width:46px;height:46px;border-radius:10px;flex:none}
.mini-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
.mini-t{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-m{font-size:12px;color:var(--ink-soft);display:flex;align-items:center;gap:4px}
.mini-corner{font-size:15px;color:var(--ink-soft);display:inline-flex}

/* ===================== DETALLE ===================== */
#view-detail{padding-bottom:0}
.detail-hero{height:240px;position:relative;display:flex;align-items:flex-end;padding:18px}
.hero-scrim{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.85),rgba(0,0,0,.15) 60%,rgba(0,0,0,.35))}
.hero-content{position:relative;z-index:2}
.back-btn{position:absolute;top:14px;left:14px;z-index:3;width:38px;height:38px;border-radius:50%;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.15);color:#fff;cursor:pointer;display:grid;place-items:center;font-size:16px}
.detail-hero h2{font-size:24px;font-weight:700;letter-spacing:-.6px;line-height:1.18;color:#fff;margin-top:8px}
.hero-loc{display:flex;align-items:center;gap:6px;margin-top:8px;font-size:13px;color:rgba(255,255,255,.82)}
.tags-row{display:flex;gap:6px;flex-wrap:wrap}
.tag{font-size:11px;font-weight:700;padding:4px 9px;border-radius:999px;display:inline-flex;align-items:center;gap:5px}
.tag-line{background:rgba(0,0,0,.42);border:1px solid rgba(255,255,255,.22);color:#fff;backdrop-filter:blur(3px)}
.detail-body{padding:18px 16px 0}
.kpis{display:flex;gap:9px;margin-bottom:14px}
.kpi{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:13px 8px;text-align:center}
.kpi .v{font-size:16px;font-weight:800;letter-spacing:-.3px}
.kpi .k{font-size:11px;color:var(--ink-soft);margin-top:4px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:4px}
.block{background:var(--surface);border:1px solid var(--line);border-radius:15px;padding:15px;margin-bottom:12px}
.block h4{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-dim);margin-bottom:11px;font-weight:700}
.block p{font-size:14.5px;line-height:1.55;color:var(--ink)}
.block p.hint{font-size:12.5px;color:var(--ink-soft);margin-top:8px;line-height:1.5}
.host-card{display:flex;align-items:center;gap:12px}
.avatar{width:46px;height:46px;border-radius:50%;flex:none;display:grid;place-items:center;font-size:16px;font-weight:700;color:var(--ink);background:var(--surface-3);border:1px solid var(--line)}
.avatar.sm{width:34px;height:34px;font-size:12px;border:2px solid var(--bg);margin-left:-10px}
.avatar.sm:first-child{margin-left:0}
.avatar.lg{width:74px;height:74px;font-size:25px}
.host-card .meta{flex:1}
.host-card .meta .n{font-size:15px;font-weight:700;display:flex;align-items:center;gap:7px}
.host-card .meta .s{font-size:12.5px;color:var(--ink-soft);margin-top:3px;display:flex;align-items:center;gap:6px}
.biz{font-size:11px;font-weight:700;background:var(--surface-3);color:var(--ink-soft);padding:3px 8px;border-radius:999px;border:1px solid var(--line)}
.trust-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.trust{font-size:12px;font-weight:600;background:var(--surface-2);color:var(--ink-soft);padding:7px 11px;border-radius:999px;display:inline-flex;gap:6px;align-items:center}
.trust .ico{color:var(--ink)}
.attendees{display:flex;align-items:center;flex-wrap:wrap;row-gap:6px}
.attendees .more{font-size:12.5px;color:var(--ink-soft);margin-left:12px;font-weight:600;display:inline-flex;align-items:center;gap:5px}
.rate{display:inline-flex;align-items:center;gap:4px;font-weight:700}
.rate .ico{color:#c9b25f}
.review{padding:11px 0;border-bottom:1px solid var(--line)}
.review:last-child{border-bottom:none}
.review .top{display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-bottom:4px}
.review .top .st{color:#c9b25f;display:inline-flex;gap:1px;font-size:12px}
.review p{font-size:13.5px;color:var(--ink-soft);line-height:1.45}
.secret-note{display:flex;gap:11px;align-items:flex-start;background:var(--surface-2);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}
.secret-note .sn-ic{font-size:18px;color:var(--ink);margin-top:1px}
.secret-note p{font-size:13px;line-height:1.5;color:var(--ink-soft)}
.place-link{display:flex;align-items:center;gap:12px;cursor:pointer;width:100%;background:none;border:none;font-family:inherit;color:var(--ink);text-align:left;padding:0}
.place-link .pl-info{flex:1;min-width:0}
.pl-n{display:block;font-weight:700;font-size:14.5px}
.pl-s{display:block;font-size:12.5px;color:var(--ink-soft);margin-top:2px}
.pl-arrow{color:var(--ink-dim);font-size:18px;display:inline-flex}

/* Toggle de presencia / privacidad */
.toggle-row{display:flex;align-items:center;gap:12px;cursor:pointer}
.tg-ic{font-size:20px;color:var(--ink);display:inline-flex}
.tg-info{flex:1;min-width:0}
.tg-n{display:block;font-size:14px;font-weight:700}
.tg-s{display:block;font-size:12px;color:var(--ink-soft);margin-top:2px}
.switch{flex:none;width:42px;height:25px;border-radius:999px;background:var(--surface-3);border:1px solid var(--line);position:relative;transition:.18s}
.switch .knob{position:absolute;top:2px;left:2px;width:19px;height:19px;border-radius:50%;background:var(--ink-soft);transition:.18s}
.switch.on{background:var(--accent);border-color:var(--accent)}
.switch.on .knob{left:19px;background:#fff}

.action-bar{position:sticky;bottom:0;background:rgba(0,0,0,.9);backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:13px 16px;display:flex;align-items:center;gap:14px;margin:14px -16px 0}
.action-bar .pr .v{font-size:19px;font-weight:800}
.action-bar .pr .k{font-size:11px;color:var(--ink-soft);margin-top:1px}
.btn-join{flex:1;border:none;border-radius:13px;padding:15px;font-size:15px;font-weight:800;color:#fff;cursor:pointer;font-family:inherit;background:var(--accent);display:flex;align-items:center;justify-content:center;gap:7px}
.btn-join.done{background:var(--surface-3);color:var(--ink-soft);cursor:default}

/* ===================== PERFIL ===================== */
.profile-head{display:flex;align-items:center;gap:16px;padding:18px 16px 8px}
.ph-main{flex:1;min-width:0}
.ph-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
.ph-name{font-size:16px;font-weight:700}
.ph-handle{font-size:13px;color:var(--ink-soft);font-weight:500}
.ph-priv{font-size:12px;font-weight:700;color:var(--ink);background:var(--surface-2);border:1px solid var(--line);border-radius:999px;padding:6px 11px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:5px}
.ph-stats{display:flex;gap:18px;margin-top:12px;font-size:13px;color:var(--ink-soft)}
.ph-stats b{color:var(--ink)}
.prof-set{margin:8px 16px 4px}
.prof-tab{display:flex;align-items:center;justify-content:center;gap:7px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-soft);padding:14px 16px 12px;border-top:1px solid var(--line)}
.priv-banner{display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--ink-soft);background:var(--surface-2);border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin:0 16px 12px}

/* Navegación inferior */
.tabbar{position:absolute;left:0;right:0;bottom:0;height:62px;z-index:30;background:rgba(0,0,0,.92);backdrop-filter:blur(14px);border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-around}
.tabbar button{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--ink-dim);font-size:11px;font-weight:600;cursor:pointer;flex:1;font-family:inherit}
.tabbar button .ico{font-size:23px}
.tabbar button.active{color:var(--ink)}

/* Portadas (oscuras, sobrias) */
.g-wine{background:linear-gradient(150deg,#352230,#150f13)}
.g-sunset{background:linear-gradient(150deg,#33291f,#15110d)}
.g-grape{background:linear-gradient(150deg,#28223a,#13111c)}
.g-dark{background:linear-gradient(150deg,#26262c,#0e0e10)}
.g-forest{background:linear-gradient(150deg,#1d302c,#0e1916)}

/* Toast */
.toast{position:absolute;left:50%;bottom:78px;transform:translateX(-50%) translateY(16px);background:var(--surface-3);border:1px solid var(--line);color:var(--ink);padding:11px 18px;border-radius:999px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:.25s;z-index:50;white-space:nowrap;max-width:90%}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ======================= NUEVAS VISTAS (creación, grupos, perfil+, ajustes) ======================= */

/* Barra inferior con botón Crear centrado */
.tabbar button.create{flex:0 0 auto;color:#fff}
.create-fab{width:46px;height:46px;border-radius:14px;background:var(--accent);display:grid;place-items:center;color:#fff;box-shadow:0 4px 14px rgba(61,111,179,.45)}
.create-fab .ico{font-size:24px}

/* Barra de página (pantallas apiladas) */
.page-bar{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 14px;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.pb-title{font-size:16px;font-weight:700}
.pb-back{width:34px;height:34px;border-radius:50%;background:var(--surface-2);border:1px solid var(--line);color:var(--ink);display:grid;place-items:center;cursor:pointer;font-size:15px}
.pb-action{background:none;border:none;color:var(--accent);font-weight:700;font-size:14px;display:inline-flex;align-items:center;gap:5px;cursor:pointer;font-family:inherit}
.page-body{padding:14px 16px}

/* Formularios */
.form .field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--ink-soft);margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px}
.field input,.field textarea,.field select{width:100%;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px 13px;color:var(--ink);font-family:inherit;font-size:14.5px;outline:none}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent)}
.field textarea{resize:vertical}
.field select option{background:#16161a;color:var(--ink)}
.field .hint{font-size:12px;color:var(--ink-soft);margin-top:7px;line-height:1.45}
.form-actions{margin:18px 0 10px}
.btn-primary{width:100%;border:none;border-radius:13px;padding:15px;font-size:15px;font-weight:800;color:#fff;background:var(--accent);cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-ghost{margin-top:12px;width:100%;border:1px solid var(--line);background:var(--surface-2);color:var(--ink);border-radius:12px;padding:12px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:7px}

.cover-pick{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.sw{width:46px;height:46px;border-radius:11px;border:2px solid transparent;cursor:pointer;padding:0}
.sw.active{border-color:var(--ink)}
.add-media{font-size:12.5px;color:var(--ink-soft);display:inline-flex;align-items:center;gap:6px;border:1px dashed var(--line);padding:11px 13px;border-radius:11px}
.add-media.center{justify-content:center;width:100%;margin-top:10px}
.mini-map{display:flex;align-items:center;gap:8px;justify-content:center;height:78px;background:var(--surface);border:1px solid var(--line);border-radius:12px;color:var(--ink-soft);font-size:13px;margin-bottom:8px}

/* Chooser de creación */
.choose{display:flex;align-items:center;gap:14px;width:100%;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:15px;margin-bottom:12px;cursor:pointer;font-family:inherit;color:var(--ink);text-align:left}
.ch-ic{width:42px;height:42px;border-radius:11px;background:var(--surface-3);display:grid;place-items:center;font-size:20px;flex:none}
.ch-tx{flex:1}.ch-t{display:block;font-size:15px;font-weight:700}.ch-s{display:block;font-size:12.5px;color:var(--ink-soft);margin-top:2px}

/* Vista previa de publicación */
.post-prev{height:230px;border-radius:14px;overflow:hidden;position:relative}
.post-prev .pp{display:block;width:100%;height:100%;border-radius:14px;position:relative}
.post-prev.carrusel{display:flex;gap:6px}

function ico(name){ return `<i class="ico">${SVG[name]||''}</i>`; }
const ICON_FOR_CAT = { outdoor:'mountain', fiesta:'music', gastro:'food', cultura:'landmark', deporte:'flag', bienestar:'leaf', social:'chat', viajeros:'compass' };
const POST_ICON = { foto:'image', video:'video', carrusel:'stack' };

/* ---------- utilidades ---------- */
function fmtCountdown(date){
  const diff = date - Date.now();
  if (diff <= 0) return 'En marcha';
  const h = Math.floor(diff/3600000), d = Math.floor(h/24);
  if (d >= 1) return `${d} d ${h%24} h`;
  const m = Math.floor((diff%3600000)/60000);
  return `${h} h ${m} min`;
}
function fmtWhen(date){
  const dias=['dom','lun','mar','mié','jue','vie','sáb'];
  return `${dias[date.getDay()]} · ${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
}
function sizeBucket(p){ if (p.groupMax<=8) return 'intimo'; if (p.groupMax<=20) return 'mediano'; return 'grande'; }
function sizeLabel(p){ return {intimo:'Íntimo',mediano:'Mediano',grande:'Grande'}[sizeBucket(p)]; }
function initials(name){ return name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase(); }
function rating(n){ return `<span class="rate">${ico('star')} ${n}</span>`; }
function freeIcon(p){ return p.secret ? ico('lock') : (p.paid ? ico('euro') : ico('ticket')); }
function uimg(slug,s){ s=s||500; return `https://images.unsplash.com/photo-${slug}?w=${s}&h=${s}&fit=crop&q=60`; }
// Imagen de portada sobre el degradado; si no carga se elimina y queda el degradado (fallback).
function coverImg(slug,s){ return slug ? `<img class="cover-img" src="${uimg(slug,s)}" alt="" loading="lazy" onerror="this.remove()">` : ''; }
function escapeHtml(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function val(id){ const el=document.getElementById(id); return el?el.value:''; }
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._tmo);t._tmo=setTimeout(()=>t.classList.remove('show'),2100);
}
function typeBadge(u){ return u.type==='profesional' ? `<span class="pro-badge">${ico('briefcase')} Profesional</span>` : ''; }

/* ---------- filtrado feed ---------- */
function filteredPlans(){
  return PLANS.filter(p=>{
    if (state.size!=='todos' && sizeBucket(p)!==state.size) return false;
    if (state.category!=='todas' && p.category!==state.category) return false;
    if (state.price==='gratis' && p.paid) return false;
    if (state.price==='pago' && !p.paid) return false;
    return true;
  });
}
function gridCell(p){
  const place = getPlace(p.placeId);
  const loc = p.secret ? 'Zona aprox.' : (place ? place.name : 'Madrid');
  return `
  <button class="cell ${p.gradient}" onclick="go('plan/${p.id}')" aria-label="${escapeHtml(p.title)}">
    ${coverImg(p.photo,500)}
    <span class="cell-scrim"></span>
    <span class="cell-corner" title="${p.paid?'De pago':'Gratis'}">${freeIcon(p)}</span>
    <span class="cell-info">
      <span class="cell-title">${escapeHtml(p.title)}</span>
      <span class="cell-meta">${escapeHtml(loc)} · ${ico('geo')} ${p.attended}</span>
    </span>
  </button>`;
}
function renderFeed(){
  const plans = filteredPlans();
  const cont = document.getElementById('feed-list');
  cont.innerHTML = plans.length ? `<div class="grid">${plans.map(gridCell).join('')}</div>`
    : emptyTab('grid','Sin planes con esos filtros','Prueba a ampliar el tamaño de grupo o el tema.');
}
function renderVividasTab(){
  const cells = AFTERMOVIES.concat(AFTERMOVIES).slice(0,6).map(a=>`
    <button class="cell ${a.gradient}" onclick="toast('Aftermovie · ${a.hashtag}')" aria-label="${a.planTitle}">
      ${coverImg(a.photo,500)}
      <span class="cell-scrim"></span><span class="cell-corner">${ico('heart')}</span>
      <span class="cell-info"><span class="cell-title">${a.hashtag}</span><span class="cell-meta">${a.author}</span></span>
    </button>`).join('');
  return `<div class="grid">${cells}</div>`;
}
function emptyTab(icon,title,text){ return `<div class="empty-tab"><span class="empty-ic">${ico(icon)}</span><h3>${title}</h3><p>${text}</p></div>`; }
function renderContent(){
  const filters = document.getElementById('feed-filters');
  const list = document.getElementById('feed-list');
  document.querySelectorAll('.content-tabs button').forEach(b=> b.classList.toggle('active', b.dataset.tab===state.contentTab));

  else {
    filters.style.display='none';

    else if (state.contentTab==='stories') list.innerHTML = emptyTab('live','Stories · el “ahora mismo”','Contenido efímero de planes en marcha. El prototipo se centra en las vistas principales y los flujos de creación.');
    else list.innerHTML = emptyTab('at','Menciones','Aquí llegan los planes y stories donde te etiquetan. Una mención no se asocia a tu perfil hasta que la aceptas.');

}

/* ---------- asistencia + presencia ---------- */
function togglePresence(id){ state.presencePublic = !state.presencePublic; renderDetail(id); }
function registerArrival(id){
  const p = getPlan(id);
  if (state.attended.has(id)) return;
  state.attended.add(id); p.attended = (p.attended||0)+1;
  if (state.presencePublic){ if(!p.publicAttendees.includes(ME.initials)) p.publicAttendees.unshift(ME.initials); }
  else { p.attendedPrivate = (p.attendedPrivate||0)+1; }
  if (!ME.attendedPlanIds.includes(id)) ME.attendedPlanIds.push(id);
  toast(state.presencePublic ? 'Llegada verificada por ubicación · presencia pública' : 'Llegada verificada por ubicación · presencia privada');
  renderDetail(id);
}
function requestAttendance(id){
  if (state.requested.has(id)) return;
  state.requested.add(id);
  REQUESTS.push({ id:'r'+Date.now(), planId:id, userId:'me', status:'pendiente', message:'Solicitud enviada desde el prototipo.' });
  toast('Solicitud de asistencia enviada · pendiente de aprobación');
  renderDetail(id);
}
function canManage(p){ // ¿puede el usuario actual gestionar solicitudes de este plan?
  if (p.approval!=='manual') return false;
  if (p.groupId){ const g=getGroup(p.groupId); return g && g.members.some(m=>m.userId==='me' && m.role==='admin'); }
  return false;
}

function toggleJoin(id){
  const p=getPlan(id);
  if (state.joined.has(id)) state.joined.delete(id);
  else { state.joined.add(id); toast(p.paid?'Reserva retenida en escrow':'Apuntado · verifica tu identidad antes del plan'); }

/* ---------- solicitudes (aprobación) ---------- */
function renderRequests(planId){
  const p = getPlan(planId);
  const group = p.groupId ? getGroup(p.groupId) : null;
  const admins = group ? group.members.filter(m=>m.role==='admin').map(m=>getUser(m.userId)) : [];
  const reqs = requestsForPlan(planId);
  const rowsHtml = reqs.map(r=>{
    const u = getUser(r.userId) || { name:r.userId, initials:'?' };
    const st = r.status;
    return `<div class="req">
      <span class="avatar">${u.initials||initials(u.name)}</span>
      <div class="req-info"><div class="req-n">${escapeHtml(u.name)}</div><div class="req-m">${escapeHtml(r.message||'')}</div></div>
      ${st==='pendiente'
        ? `<div class="req-actions"><button class="ico-btn ok" onclick="resolveRequest('${r.id}','aceptada','${planId}')" aria-label="Aceptar">${ico('check')}</button>
           <button class="ico-btn no" onclick="resolveRequest('${r.id}','rechazada','${planId}')" aria-label="Rechazar">${ico('close')}</button></div>`
        : `<span class="req-state ${st}">${st==='aceptada'?'Aceptada':'Rechazada'}</span>`}
    </div>`;
  }).join('') || `<p class="hint">No hay solicitudes para este plan.</p>`;

  const view = document.getElementById('view-page');
  view.innerHTML = pageHead('Solicitudes de asistencia') + `
    <div class="page-body">
      <div class="block"><h4>${escapeHtml(p.title)}</h4>
        ${group?`<p class="hint">Aprueban los admins del grupo <b>${escapeHtml(group.name)}</b>: ${admins.map(a=>escapeHtml(a.name)).join(', ')}.</p>`
                :'<p class="hint">Las aprueba el creador del plan.</p>'}
      </div>
      <div class="block"><h4>Solicitudes (${reqs.filter(r=>r.status==='pendiente').length} pendientes)</h4>${rowsHtml}</div>
    </div>`;
}
function resolveRequest(reqId, decision, planId){
  const r = REQUESTS.find(x=>x.id===reqId); if(!r) return;
  r.status = decision;
  if (decision==='aceptada'){
    const p = getPlan(planId), u = getUser(r.userId);
    p.attended = (p.attended||0)+1;
    if (u && !p.publicAttendees.includes(u.initials)) p.publicAttendees.unshift(u.initials);
    toast('Solicitud aceptada · ahora es asistente');
  } else toast('Solicitud rechazada');
  renderRequests(planId);
}

      <span class="mem-n">${escapeHtml(u.name)}${m.userId==='me'?' (tú)':''}</span>${roleBadge(m.role)}</button>`; }).join('');
  const plans = g.planIds.map(getPlan).filter(Boolean).map(miniPlan).join('') || '<p class="hint">Aún no hay planes en el grupo.</p>';
  view.innerHTML = pageHead(g.name) + `
    <div class="page-body">
      <div class="group-hero ${g.gradient}">${ico('group')}</div>
      <p class="bio">${escapeHtml(g.about)}</p>
      <div class="block"><h4>Miembros (${g.members.length})</h4>${members}
        <p class="hint">Las solicitudes de asistencia a los planes del grupo las aprueban los admins: <b>${admins.map(escapeHtml).join(', ')}</b>.</p></div>
      <div class="block"><h4>Planes del grupo</h4>${plans}
        <button class="btn-ghost" onclick="state.pendingGroup='${g.id}';go('crear-plan')">${ico('plus')} Crear plan en el grupo</button></div>
    </div>`;
}
function renderCreateGroup(){
  const view = document.getElementById('view-page');
  const others = USERS.filter(u=>u.id!=='me');
  const memberRows = others.map(u=>{
    const role = state.draftMembers[u.id];
    return `<div class="pick-row">
      <span class="avatar sm">${u.initials}</span><span class="pick-n">${escapeHtml(u.name)} ${typeBadge(u)}</span>
      <div class="role-seg">
        <button class="${role===undefined?'active':''}" onclick="setMember('${u.id}',undefined)">No</button>
        <button class="${role==='miembro'?'active':''}" onclick="setMember('${u.id}','miembro')">Miembro</button>
        <button class="${role==='admin'?'active':''}" onclick="setMember('${u.id}','admin')">Admin</button>
      </div></div>`;
  }).join('');
  view.innerHTML = pageHead('Crear grupo') + `
    <div class="page-body form">
      <div class="field"><label>Nombre del grupo</label><input id="f-gname" placeholder="Ej. Runners Madrid" value="${escapeHtml(state.draftGName||'')}" /></div>
      <div class="field"><label>Descripción</label><textarea id="f-gabout" rows="2" placeholder="¿De qué va el grupo?">${escapeHtml(state.draftGAbout||'')}</textarea></div>
      <div class="field"><label>Miembros y roles</label>
        <p class="hint">Tú eres admin por defecto. Puedes nombrar varios admins.</p>
        ${memberRows}</div>
      <div class="form-actions"><button class="btn-primary" onclick="publishGroup()">${ico('check')} Crear grupo</button></div>
    </div>`;
}
function setMember(uid, role){ state.draftGName=val('f-gname'); state.draftGAbout=val('f-gabout'); if(role===undefined) delete state.draftMembers[uid]; else state.draftMembers[uid]=role; renderCreateGroup(); }
function publishGroup(){
  const name = val('f-gname').trim() || 'Nuevo grupo';
  const about = val('f-gabout').trim() || 'Grupo creado desde el prototipo.';
  const members = [{userId:'me',role:'admin'}].concat(Object.entries(state.draftMembers).map(([userId,role])=>({userId,role})));
  const g = { id:'g'+Date.now(), name, about, gradient:'g-dark', members, planIds:[] };
  GROUPS.unshift(g); state.draftMembers={}; state.draftGName=''; state.draftGAbout='';
  toast('Grupo creado'); go('grupo/'+g.id);
}

/* ---------- creación: chooser / plan / post ---------- */
function renderCreateChooser(){
  const view = document.getElementById('view-page');
  const opt=(icon,t,s,route)=>`<button class="choose" onclick="go('${route}')"><span class="ch-ic">${ico(icon)}</span>
    <span class="ch-tx"><span class="ch-t">${t}</span><span class="ch-s">${s}</span></span><span class="pl-arrow">${ico('chevR')}</span></button>`;
  view.innerHTML = pageHead('Crear') + `<div class="page-body">
    ${opt('pin','Plan','Organiza una quedada: libre o con aprobación','crear-plan')}
    ${opt('image','Publicación','Foto, vídeo o carrusel para tu perfil','crear-post')}
    ${opt('group','Grupo','Reúne gente con varios admins','crear-grupo')}
  </div>`;
}
function renderCreatePlan(){
  const view = document.getElementById('view-page');
  const d = state.draft;
  const covers = ['g-grape','g-wine','g-sunset','g-forest','g-dark'];
  const sizes=[['intimo','Íntimo','user'],['mediano','Mediano','users'],['grande','Grande','group']];
  const adminGroups = GROUPS.filter(g=>g.members.some(m=>m.userId==='me'&&m.role==='admin'));
  if (state.pendingGroup) d.group = state.pendingGroup;
  view.innerHTML = pageHead('Crear plan') + `
    <div class="page-body form">
      <div class="field"><label>Portada</label>
        <div class="cover-pick" id="cover-pick">${covers.map(c=>`<button class="sw ${c} ${d.cover===c?'active':''}" data-v="${c}" onclick="setDraft('cover','${c}')"></button>`).join('')}
          <span class="add-media">${ico('image')} Añadir fotos/vídeo</span></div></div>
      <div class="field"><label>Título</label><input id="f-title" placeholder="Ej. Atardecer en el mirador" /></div>
      <div class="field"><label>Descripción</label><textarea id="f-desc" rows="3" placeholder="¿En qué consiste el plan?"></textarea></div>
      <div class="field"><label>Lugar</label>
        <div class="mini-map">${ico('map')} Selecciona en el mapa</div>
        <select id="f-place">${PLACES.map(pl=>`<option value="${pl.id}">${pl.name} · ${pl.city}</option>`).join('')}</select></div>
      <div class="field"><label>Fecha y hora</label><input id="f-date" type="datetime-local" /></div>
      <div class="field"><label>Tamaño de grupo</label>
        <div class="iseg" id="d-size">${sizes.map(([v,l,n])=>`<button data-v="${v}" class="${d.size===v?'active':''}" onclick="setDraft('size','${v}')">${ico(n)}<span>${l}</span></button>`).join('')}</div></div>
      <div class="field"><label>Tema</label>
        <div class="chips" id="d-cat">${CATEGORIES.map(c=>`<button data-v="${c.id}" class="${d.cat===c.id?'active':''}" onclick="setDraft('cat','${c.id}')">${ico(ICON_FOR_CAT[c.id])}<span>${c.label}</span></button>`).join('')}</div></div>
      <div class="field"><label>Precio</label>
        <div class="iseg" id="d-price">
          <button data-v="gratis" class="${d.price==='gratis'?'active':''}" onclick="setDraft('price','gratis')">${ico('ticket')}<span>Gratis</span></button>
          <button data-v="pago" class="${d.price==='pago'?'active':''}" onclick="setDraft('price','pago')">${ico('euro')}<span>De pago</span></button></div>
        <input id="f-price" type="number" min="0" placeholder="Precio en € (si es de pago)" style="margin-top:8px" /></div>
      <div class="field"><label>Tipo de asistencia</label>
        <div class="iseg" id="d-access">
          <button data-v="libre" class="${d.access==='libre'?'active':''}" onclick="setDraft('access','libre')">${ico('globe')}<span>Libre</span></button>
          <button data-v="aprobacion" class="${d.access==='aprobacion'?'active':''}" onclick="setDraft('access','aprobacion')">${ico('check')}<span>Con aprobación</span></button></div>
        <p class="hint" id="access-hint">${d.access==='aprobacion'?'Recibirás solicitudes de asistencia y decides a quién aceptas.':'Cualquiera puede asistir; la presencia se verifica por ubicación.'}</p></div>
      <div class="field"><label>Grupo organizador (opcional)</label>
        <select id="f-group"><option value="">Ninguno</option>${adminGroups.map(g=>`<option value="${g.id}" ${d.group===g.id?'selected':''}>${g.name}</option>`).join('')}</select>
        <p class="hint">Si eliges un grupo, sus admins aprueban las solicitudes.</p></div>
      <div class="form-actions"><button class="btn-primary" onclick="publishPlan()">${ico('check')} Publicar plan</button></div>
    </div>`;
}
function setDraft(key,v){
  state.draft[key]=v;
  const id={cover:'cover-pick',size:'d-size',cat:'d-cat',price:'d-price',access:'d-access'}[key];
  const c=id&&document.getElementById(id);
  if(c) c.querySelectorAll('button').forEach(b=>b.classList.toggle('active', b.dataset.v===v));
  if(key==='access'){ const h=document.getElementById('access-hint'); if(h) h.textContent = v==='aprobacion'
    ? 'Recibirás solicitudes de asistencia y decides a quién aceptas.'
    : 'Cualquiera puede asistir; la presencia se verifica por ubicación.'; }
}
function publishPlan(){
  const d = state.draft;
  const title = val('f-title').trim() || 'Plan sin título';
  const desc = val('f-desc').trim() || 'Plan creado desde el prototipo.';
  const placeId = val('f-place') || PLACES[0].id;
  const dateRaw = val('f-date');
  const when = dateRaw ? new Date(dateRaw) : new Date(Date.now()+24*3600*1000);
  const paid = d.price==='pago';
  const price = paid ? (parseInt(val('f-price'),10) || 10) : 0;
  const ranges = { intimo:[2,8], mediano:[6,20], grande:[15,60] }[d.size];
  const groupId = val('f-group') || null;
  const access = d.access;
  const plan = {
    id:'np'+Date.now(), title, summary:desc, placeId, category:d.cat, gradient:d.cover,
    level:2, paid, price, recurring:false, secret:false,
    host:{ name:ME.name, business:ME.type==='profesional', verified:ME.verified, rating:5.0, reliability:100 },
    when, groupMin:ranges[0], groupMax:ranges[1], joined:0, attended:0, publicAttendees:[], attendedPrivate:0,
    joinType: access==='libre' ? 'libre' : 'apuntado',
    approval: access==='aprobacion' ? 'manual' : (access==='libre' ? 'libre' : 'automatica'),
    groupId,
  };
  PLANS.unshift(plan);
  if (groupId){ const g=getGroup(groupId); if(g) g.planIds.unshift(plan.id); }
  state.pendingGroup = null;
  toast('Plan publicado'); go('plan/'+plan.id);
}
function freshPostDraft(){ return { kind:'foto', caption:'', tags:[], place:'', planId:'', alt:'', audience:'publico', comments:true, hideLikes:false, alsoStory:false }; }
function capturePostInputs(){
  const d=state.draftPost;
  d.caption=val('f-caption'); d.alt=val('f-alt');
  d.place=val('f-postplace'); d.planId=val('f-postplan');
}
function highlightCaption(text){
  return escapeHtml(text)
    .replace(/(^|\s)(@[\wáéíóúñ]+)/gi,'$1<span class="mention">$2</span>')
    .replace(/(^|\s)(#[\wáéíóúñ]+)/gi,'$1<span class="hash">$2</span>');
}
function updateCaptionPreview(){
  const el=document.getElementById('cap-preview'); if(!el) return;
  const t=val('f-caption');
  el.innerHTML = t ? highlightCaption(t) : '<span class="ph">La vista previa del pie aparecerá aquí…</span>';
}
function renderCreatePost(){
  const view = document.getElementById('view-page');
  const d = state.draftPost, k = d.kind;
  const sample = [['g-grape','1566737236500-c8ac43014a67'],['g-sunset','1495567720989-cebdbdd97913'],['g-forest','1551632811-561732d1e306']];
  const preview = k==='carrusel'
    ? `<div class="post-prev carrusel">${sample.map(([c,ph])=>`<span class="pp ${c}">${coverImg(ph,500)}</span>`).join('')}<span class="pp-dots">1 / ${sample.length}</span></div>`
    : `<div class="post-prev"><span class="pp ${sample[0][0]}">${coverImg(sample[0][1],700)}${k==='video'?`<span class="play-ov">${ico('play')}</span>`:''}</span></div>`;
  // planes vinculables: a los que asististe o que creaste
  const linkable = PLANS.filter(p=> (ME.attendedPlanIds||[]).includes(p.id) || p.host.name===ME.name);
  const aud=[['publico','Público','globe'],['seguidores','Seguidores','users'],['cercanos','Cercanos','star']];
  const tagChips = USERS.filter(u=>u.id!=='me').map(u=>`<button class="tag-chip ${d.tags.includes(u.id)?'active':''}" onclick="togglePostTag('${u.id}')">${ico('user')} ${escapeHtml(u.name)}</button>`).join('');
  const optRow=(icon,label,key,sub='')=>`<div class="opt-row" onclick="togglePostOpt('${key}')"><span class="or-ic">${ico(icon)}</span>
    <span class="or-l">${label}${sub?`<span class="or-s">${sub}</span>`:''}</span>
    <span class="switch ${d[key]?'on':''}"><span class="knob"></span></span></div>`;
  view.innerHTML = pageHead('Nueva publicación') + `
    <div class="page-body form">
      <div class="field"><label>Tipo</label>
        <div class="iseg" id="d-postkind">
          <button class="${k==='foto'?'active':''}" onclick="setPostField('kind','foto')">${ico('image')}<span>Foto</span></button>
          <button class="${k==='video'?'active':''}" onclick="setPostField('kind','video')">${ico('video')}<span>Vídeo</span></button>
          <button class="${k==='carrusel'?'active':''}" onclick="setPostField('kind','carrusel')">${ico('stack')}<span>Carrusel</span></button></div></div>
      <div class="field"><label>Vista previa</label>${preview}<span class="add-media center">${ico('image')} Añadir desde galería</span></div>

      <div class="field"><label>Pie de texto</label>
        <textarea id="f-caption" rows="3" placeholder="Escribe un pie… usa @ para mencionar y # para temas" oninput="updateCaptionPreview()">${escapeHtml(d.caption||'')}</textarea>
        <div class="cap-preview" id="cap-preview">${d.caption?highlightCaption(d.caption):'<span class="ph">La vista previa del pie aparecerá aquí…</span>'}</div></div>

      <div class="field"><label>Audiencia</label>
        <div class="iseg" id="d-audience">${aud.map(([v,l,n])=>`<button class="${d.audience===v?'active':''}" onclick="setPostField('audience','${v}')">${ico(n)}<span>${l}</span></button>`).join('')}</div>
        <p class="hint">Coherente con tu perfil: en un perfil privado, "Público" se limita a tus seguidores aprobados.</p></div>

      <div class="adv-title">Añadir a la publicación</div>
      <div class="opt-list">
        <div class="opt-row"><span class="or-ic">${ico('link')}</span><span class="or-l">Vincular a un plan<span class="or-s">aparece ligada al plan</span></span>
          <select id="f-postplan" class="or-sel"><option value="">Ninguno</option>${linkable.map(p=>`<option value="${p.id}" ${d.planId===p.id?'selected':''}>${escapeHtml(p.title)}</option>`).join('')}</select></div>
        <div class="opt-row"><span class="or-ic">${ico('pin')}</span><span class="or-l">Ubicación</span>
          <select id="f-postplace" class="or-sel"><option value="">Sin ubicación</option>${PLACES.map(pl=>`<option value="${pl.id}" ${d.place===pl.id?'selected':''}>${escapeHtml(pl.name)} · ${pl.city}</option>`).join('')}</select></div>
      </div>

      <div class="field" style="margin-top:16px"><label>${ico('tag')} Etiquetar personas</label>
        <div class="tag-chips">${tagChips}</div></div>

      <div class="field"><label>${ico('doc')} Texto alternativo (accesibilidad)</label>
        <input id="f-alt" placeholder="Describe la imagen para lectores de pantalla" value="${escapeHtml(d.alt||'')}" /></div>

      <div class="adv-title">Opciones</div>
      <div class="opt-list">
        ${optRow('chat','Comentarios activos','comments','permitir comentarios')}
        ${optRow('eye','Ocultar el número de Me gusta','hideLikes','solo tú verás el total')}
        ${optRow('live','Compartir también en Stories','alsoStory','24 h en tu pestaña Stories')}
      </div>

      <div class="form-actions"><button class="btn-primary" onclick="publishPost()">${ico('check')} Publicar</button></div>
    </div>`;
}
function setPostField(key,v){ capturePostInputs(); state.draftPost[key]=v; renderCreatePost(); }
function togglePostTag(uid){ capturePostInputs(); const t=state.draftPost.tags; const i=t.indexOf(uid); if(i>=0) t.splice(i,1); else t.push(uid); renderCreatePost(); }
function togglePostOpt(key){ capturePostInputs(); state.draftPost[key]=!state.draftPost[key]; renderCreatePost(); }
function publishPost(){
  capturePostInputs();
  const d = state.draftPost, k = d.kind;
  const caption = (d.caption||'').trim() || 'Nueva publicación';
  const media = k==='carrusel' ? ['g-grape','g-sunset','g-forest'] : [k==='video'?'g-grape':'g-sunset'];
  const mentions = (caption.match(/@[\wáéíóúñ]+/gi)||[]);
  const hashtags = (caption.match(/#[\wáéíóúñ]+/gi)||[]);
  POSTS.unshift({
    id:'npo'+Date.now(), authorId:'me', kind:k, media, caption, likes:0,
    placeId:d.place||null, taggedUserIds:[...d.tags], planId:d.planId||null, altText:(d.alt||'').trim(),
    mentions, hashtags, audience:d.audience, commentsEnabled:d.comments, hideLikes:d.hideLikes, sharedToStory:d.alsoStory,
  });
  const story = d.alsoStory;
  state.draftPost = freshPostDraft();
  toast(story ? 'Publicación creada · compartida en Stories' : 'Publicación creada');
  state.profileTab='posts'; go('perfil');
}

/* ---------- helpers de página ---------- */
function pageHead(title){ return `<div class="page-bar"><button class="pb-back" onclick="history.back()" aria-label="Atrás">${ico('chevL')}</button><span class="pb-title">${escapeHtml(title)}</span><span style="width:34px"></span></div>`; }

/* ---------- filtros del feed ---------- */
function buildFilters(){
  const cont = document.getElementById('feed-filters');
  const sizes=[['todos','Todos','layers'],['intimo','Íntimo','user'],['mediano','Mediano','users'],['grande','Grande','group']];
  const prices=[['todos','Todo','layers'],['gratis','Gratis','ticket'],['pago','Pago','euro']];
  const ichip=(v,l,name,act)=>`<button data-v="${v}" class="${act?'active':''}">${ico(name)}<span>${l}</span></button>`;
  cont.innerHTML = `
    <div class="chips" id="chips-cat">${ichip('todas','Todos','hash',true)}${CATEGORIES.map(c=>ichip(c.id,c.label,ICON_FOR_CAT[c.id]||'hash',false)).join('')}</div>
    <div class="seg-row">
      <div class="iseg" id="seg-size">${sizes.map(([v,l,n])=>ichip(v,l,n,v==='todos')).join('')}</div>
      <div class="iseg" id="seg-price">${prices.map(([v,l,n])=>ichip(v,l,n,v==='todos')).join('')}</div></div>`;
  cont.querySelector('#seg-size').onclick = e=>{ const b=e.target.closest('button'); if(!b)return; state.size=b.dataset.v; setActive('#seg-size button',b); renderFeed(); };
  cont.querySelector('#seg-price').onclick = e=>{ const b=e.target.closest('button'); if(!b)return; state.price=b.dataset.v; setActive('#seg-price button',b); renderFeed(); };
  cont.querySelector('#chips-cat').onclick = e=>{ const b=e.target.closest('button'); if(!b)return; state.category=b.dataset.v; setActive('#chips-cat button',b); renderFeed(); };
}
function setActive(sel,el){ document.querySelectorAll(sel).forEach(x=>x.classList.remove('active')); el.classList.add('active'); }

/* ---------- router ---------- */
function go(path){ location.hash = '#/'+path; }
const VIEWS = ['feed','mapa','grupos','perfil','detail','page'];
function showView(name){
  VIEWS.forEach(v=> document.getElementById('view-'+v).classList.toggle('hidden', v!==name));
  document.getElementById('appbar-tabs').style.display = (name==='feed')?'block':'none';
  const navFor = { feed:'feed', mapa:'mapa', grupos:'grupos', perfil:'perfil' };
  const active = navFor[name] || state.navTab;
  document.querySelectorAll('.tabbar button').forEach(b=> b.classList.toggle('active', b.dataset.nav===active));
}
function scrollTop(v){ const el=document.getElementById('view-'+v); if(el) el.scrollTop=0; }
function router(){
  const hash = location.hash.replace(/^#\//,'') || 'feed';
  const [route,arg] = hash.split('/');
  switch(route){
    case 'mapa':    state.navTab='mapa'; renderMap(); showView('mapa'); break;
    case 'grupos':  state.navTab='grupos'; renderGroups(); showView('grupos'); break;
    case 'perfil':  state.navTab='perfil'; renderProfile('me'); showView('perfil'); break;
    case 'plan':    renderDetail(arg); showView('detail'); scrollTop('detail'); break;
    case 'u':       renderProfile(arg); showView('page'); scrollTop('page'); break;
    case 'grupo':   renderGroupDetail(arg); showView('page'); scrollTop('page'); break;
    case 'ajustes': renderSettings(); showView('page'); scrollTop('page'); break;
    case 'solicitudes': renderRequests(arg); showView('page'); scrollTop('page'); break;
    case 'crear':   renderCreateChooser(); showView('page'); scrollTop('page'); break;
    case 'crear-plan':  renderCreatePlan(); showView('page'); scrollTop('page'); break;
    case 'crear-post':  renderCreatePost(); showView('page'); scrollTop('page'); break;
    case 'crear-grupo': renderCreateGroup(); showView('page'); scrollTop('page'); break;
    default:        state.navTab='feed'; renderContent(); showView('feed');
  }
}

/* ---------- init ---------- */
function init(){
  buildFilters();
  document.querySelectorAll('.content-tabs button').forEach(b=>{ b.onclick=()=>{ state.contentTab=b.dataset.tab; renderContent(); }; });
  document.querySelectorAll('.tabbar button').forEach(b=>{ b.onclick=()=>go(b.dataset.nav==='crear'?'crear':b.dataset.nav); });
  window.addEventListener('hashchange', router);
  router();
}
if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
else init();

  </script>
