<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="color-scheme" content="dark" />
  <title>Prototipo · App de planes</title>
  <meta name="description" content="Prototipo visual navegable de la app de planes (basado en PRODUCTO.md)." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="phone">
    <header class="appbar">
      <div class="brand">
        <h1>planes</h1>
        <span class="spacer"></span>
        <span class="tag">prototipo</span>
      </div>
      <div id="appbar-tabs">
        <nav class="content-tabs">
          <button data-tab="vividas" aria-label="Vividas">
            <i class="ico"><svg viewBox="0 0 24 24"><rect x="3.5" y="4.5" width="17" height="15" rx="3.5"/><path d="M10.5 9.2v5.6l4.5-2.8z" class="fill"/></svg></i><span>Vividas</span>
          </button>
          <button data-tab="disponibles" class="active" aria-label="Disponibles">
            <i class="ico"><svg viewBox="0 0 24 24"><rect x="3.5" y="3.5" width="7" height="7" rx="1.4"/><rect x="13.5" y="3.5" width="7" height="7" rx="1.4"/><rect x="3.5" y="13.5" width="7" height="7" rx="1.4"/><rect x="13.5" y="13.5" width="7" height="7" rx="1.4"/></svg></i><span>Disponibles</span>
          </button>
          <button data-tab="stories" aria-label="Stories">
            <i class="ico"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8.4"/><circle cx="12" cy="12" r="2.6" class="fill"/></svg></i><span>Stories</span>
          </button>
          <button data-tab="menciones" aria-label="Menciones">
            <i class="ico"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.6"/><path d="M15.6 12v1.6a2.4 2.4 0 0 0 4.4-1.6 8 8 0 1 0-3.2 6.4"/></svg></i><span>Menciones</span>
          </button>
        </nav>
      </div>
    </header>

    <main id="view-feed" class="view">
      <div id="feed-filters" class="filters"></div>
      <div id="feed-list"></div>
    </main>

    <main id="view-mapa" class="view hidden">
      <div class="map-wrap"><div id="map" class="map"></div></div>
      <div id="map-sheet" class="map-sheet"></div>
    </main>

    <main id="view-grupos" class="view hidden"></main>
    <main id="view-perfil" class="view hidden"></main>
    <main id="view-page" class="view hidden"></main>
    <main id="view-detail" class="view hidden"></main>

    <nav class="tabbar">
      <button data-nav="feed" class="active" aria-label="Descubrir">
        <i class="ico"><svg viewBox="0 0 24 24"><path d="M4 11 12 4l8 7M6 9.5V20h12V9.5"/></svg></i>Descubrir
      </button>
      <button data-nav="mapa" aria-label="Mapa">
        <i class="ico"><svg viewBox="0 0 24 24"><path d="M9 4 3.5 6.2v13.6L9 17.6l6 2.2 5.5-2.2V3.9L15 6.1z"/><path d="M9 4v13.6M15 6.1v13.7"/></svg></i>Mapa
      </button>
      <button data-nav="crear" class="create" aria-label="Crear">
        <span class="create-fab"><i class="ico"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></i></span>
      </button>
      <button data-nav="grupos" aria-label="Grupos">
        <i class="ico"><svg viewBox="0 0 24 24"><circle cx="12" cy="7.5" r="2.7"/><circle cx="5.5" cy="10" r="2.3"/><circle cx="18.5" cy="10" r="2.3"/><path d="M7.5 18a4.5 4.5 0 0 1 9 0M2.5 17.5a3.5 3.5 0 0 1 3.4-3.2M21.5 17.5a3.5 3.5 0 0 0-3.4-3.2"/></svg></i>Grupos
      </button>
      <button data-nav="perfil" aria-label="Perfil">
        <i class="ico"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3.3"/><path d="M5.6 19a6.4 6.4 0 0 1 12.8 0"/></svg></i>Perfil
      </button>
    </nav>

    <div id="toast" class="toast"></div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
